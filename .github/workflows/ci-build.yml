name: Build Desktop Binaries

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: LinUCommandTestGui-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: LinUCommandTestGui-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore LinUCommandTestGui/LinUCommandTestGui.csproj

      - name: Publish
        run: >
          dotnet publish LinUCommandTestGui/LinUCommandTestGui.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o artifacts/${{ matrix.rid }}

      - name: Package (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path "artifacts/${{ matrix.rid }}/*" -DestinationPath "dist/${{ matrix.artifact_name }}.zip" -Force

      - name: Package (Linux)
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          mkdir -p dist
          chmod +x artifacts/${{ matrix.rid }}/LinUCommandTestGui || true
          tar -C artifacts/${{ matrix.rid }} -czf dist/${{ matrix.artifact_name }}.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error
